name: Validate

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: current
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Run Linter
        run: npm run lint

      - name: ✨ Check Formatting
        run: npm run format:check
